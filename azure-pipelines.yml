trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  terraformWorkingDir: terraform/azure

stages:
- stage: Validate
  displayName: Terraform Validate
  jobs:
  - job: terraform_validate
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform fmt -check
      workingDirectory: $(terraformWorkingDir)
      displayName: Terraform Format Check

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        backendServiceArm: azure-terraform-plan
        workingDirectory: $(terraformWorkingDir)

    - task: TerraformTaskV4@4
      displayName: Terraform Validate
      inputs:
        provider: azurerm
        command: validate
        workingDirectory: $(terraformWorkingDir)

- stage: Plan
  displayName: Terraform Plan
  dependsOn: Validate
  jobs:
  - job: terraform_plan
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        backendServiceArm: azure-terraform-plan
        workingDirectory: $(terraformWorkingDir)

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        commandOptions: '-out=tfplan'
        backendServiceArm: azure-terraform-plan
        workingDirectory: $(terraformWorkingDir)

    - publish: $(terraformWorkingDir)/tfplan
      artifact: terraform-plan