trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest



variables:
  - group: aws-terraform-ci
  - name: terraformWorkingDir
    value: terraform/azure


stages:

- stage: Validate
  displayName: Terraform Validate
  jobs:
  - job: terraform_validate
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - task: AzureCLI@2
      displayName: Terraform Validate (Azure CLI Auth)
      inputs:
        azureSubscription: azure-terraform-plan
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd $(terraformWorkingDir)
          terraform init
          terraform fmt -check -recursive
          terraform validate

- stage: Plan
  displayName: Terraform Plan
  dependsOn: Validate
  jobs:
  - job: terraform_plan
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - task: AzureCLI@2
      displayName: Terraform Plan (Azure CLI Auth)
      inputs:
        azureSubscription: azure-terraform-plan
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd $(terraformWorkingDir)
          terraform init
          terraform plan -out=tfplan

    - publish: $(terraformWorkingDir)/tfplan
      artifact: terraform-plan



# -------------------------
# AWS PLAN STAGE
# -------------------------
- stage: Plan_AWS
  displayName: Terraform Plan (AWS)
  dependsOn: Validate
  jobs:
  - job: terraform_plan_aws
    displayName: Terraform Plan AWS
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - task: AWSShellScript@1
      displayName: Terraform Plan (AWS)
      inputs:
        awsCredentials: aws-terraform-plan
        regionName: us-west-2
        scriptType: bash
        inlineScript: |
          set -e
          cd terraform/aws
          terraform init -reconfigure -input=false
          terraform fmt -check -recursive
          terraform validate
          terraform plan -out=tfplan

    - publish: terraform/aws/tfplan
      displayName: Publish Terraform Plan Artifact (AWS)
      artifact: terraform-plan-aws