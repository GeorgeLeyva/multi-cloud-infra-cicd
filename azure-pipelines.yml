# Azure DevOps CI/CD pipeline for Terraform validation and governance
# Validation-only pipeline using Terraform CLI and Azure OIDC authentication
# Infrastructure apply actions are intentionally excluded

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  terraformWorkingDir: terraform/azure

stages:

# -------------------------
# VALIDATE STAGE
# -------------------------
- stage: Validate
  displayName: Terraform Validate
  jobs:
  - job: terraform_validate
    displayName: Terraform Validation
    steps:
    - checkout: self

    # Authenticate to Azure using workload identity federation
    - task: AzureCLI@2
      displayName: Azure Login (OIDC)
      inputs:
        azureSubscription: azure-terraform-plan
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Authenticated to Azure using workload identity federation"

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform init
      displayName: Terraform Init (Remote Backend)
      workingDirectory: $(terraformWorkingDir)
      env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: $(servicePrincipalId)
        ARM_TENANT_ID: $(tenantId)
        ARM_SUBSCRIPTION_ID: $(subscriptionId)

    - script: terraform fmt -check -recursive
      displayName: Terraform Format Check
      workingDirectory: $(terraformWorkingDir)

    - script: terraform validate
      displayName: Terraform Validate
      workingDirectory: $(terraformWorkingDir)
      env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: $(servicePrincipalId)
        ARM_TENANT_ID: $(tenantId)
        ARM_SUBSCRIPTION_ID: $(subscriptionId)

# -------------------------
# PLAN STAGE
# -------------------------
- stage: Plan
  displayName: Terraform Plan
  dependsOn: Validate
  jobs:
  - job: terraform_plan
    displayName: Terraform Plan Generation
    steps:
    - checkout: self

    # Azure login is required again because each job runs in a new context
    - task: AzureCLI@2
      displayName: Azure Login (OIDC)
      inputs:
        azureSubscription: azure-terraform-plan
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Authenticated to Azure using workload identity federation"

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform init
      displayName: Terraform Init (Remote Backend)
      workingDirectory: $(terraformWorkingDir)
      env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: $(servicePrincipalId)
        ARM_TENANT_ID: $(tenantId)
        ARM_SUBSCRIPTION_ID: $(subscriptionId)

    - script: terraform plan -out=tfplan
      displayName: Terraform Plan
      workingDirectory: $(terraformWorkingDir)
      env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: $(servicePrincipalId)
        ARM_TENANT_ID: $(tenantId)
        ARM_SUBSCRIPTION_ID: $(subscriptionId)

    - publish: $(terraformWorkingDir)/tfplan
      displayName: Publish Terraform Plan Artifact
      artifact: terraform-plan
