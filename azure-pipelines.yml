# Azure DevOps CI/CD pipeline for Terraform validation and governance
# Validation-only pipeline with remote backend and workload identity federation

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  terraformWorkingDir: terraform/azure

stages:

- stage: Validate
  displayName: Terraform Validate
  jobs:
  - job: terraform_validate
    displayName: Terraform Validation
    steps:
    - checkout: self

    # Azure login using workload identity federation
    - task: AzureCLI@2
      displayName: Azure Login (OIDC)
      inputs:
        azureSubscription: azure-terraform-plan
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Logged into Azure using federated identity"

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform init
      displayName: Terraform Init (Remote Backend)
      workingDirectory: $(terraformWorkingDir)

    - script: terraform fmt -check -recursive
      displayName: Terraform Format Check
      workingDirectory: $(terraformWorkingDir)

    - script: terraform validate
      displayName: Terraform Validate
      workingDirectory: $(terraformWorkingDir)

- stage: Plan
  displayName: Terraform Plan
  dependsOn: Validate
  jobs:
  - job: terraform_plan
    displayName: Terraform Plan Generation
    steps:
    - checkout: self

    # Azure login again (new job = new context)
    - task: AzureCLI@2
      displayName: Azure Login (OIDC)
      inputs:
        azureSubscription: azure-terraform-plan
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Logged into Azure using federated identity"

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform init
      displayName: Terraform Init (Remote Backend)
      workingDirectory: $(terraformWorkingDir)

    - script: terraform plan -out=tfplan
      displayName: Terraform Plan
      workingDirectory: $(terraformWorkingDir)

    - publish: $(terraformWorkingDir)/tfplan
      displayName: Publish Terraform Plan Artifact
      artifact: terraform-plan