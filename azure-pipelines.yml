# Terraform validation-only pipeline using Azure DevOps OIDC
# Remote Azure backend, no apply, no secrets

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  terraformWorkingDir: terraform/azure

stages:

# -------------------------
# VALIDATE STAGE
# -------------------------
- stage: Validate
  displayName: Terraform Validate
  jobs:
  - job: terraform_validate
    displayName: Terraform Validation
    steps:
    - checkout: self

    # Azure login using workload identity federation
    - task: AzureCLI@2
      displayName: Azure Login (OIDC)
      inputs:
        azureSubscription: azure-terraform-plan
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Azure CLI logged in via workload identity federation"
          az account show

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform init
      displayName: Terraform Init (Remote Backend)
      workingDirectory: $(terraformWorkingDir)
      env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
        ARM_TENANT_ID: $(AZURE_TENANT_ID)
        ARM_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)

    - script: terraform fmt -check -recursive
      displayName: Terraform Format Check
      workingDirectory: $(terraformWorkingDir)

    - script: terraform validate
      displayName: Terraform Validate
      workingDirectory: $(terraformWorkingDir)
      env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
        ARM_TENANT_ID: $(AZURE_TENANT_ID)
        ARM_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)

# -------------------------
# PLAN STAGE
# -------------------------
- stage: Plan
  displayName: Terraform Plan
  dependsOn: Validate
  jobs:
  - job: terraform_plan
    displayName: Terraform Plan Generation
    steps:
    - checkout: self

    # Azure login required again because jobs run in isolated agents
    - task: AzureCLI@2
      displayName: Azure Login (OIDC)
      inputs:
        azureSubscription: azure-terraform-plan
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Azure CLI logged in via workload identity federation"
          az account show

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform init
      displayName: Terraform Init (Remote Backend)
      workingDirectory: $(terraformWorkingDir)
      env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
        ARM_TENANT_ID: $(AZURE_TENANT_ID)
        ARM_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)

    - script: terraform plan -out=tfplan
      displayName: Terraform Plan
      workingDirectory: $(terraformWorkingDir)
      env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
        ARM_TENANT_ID: $(AZURE_TENANT_ID)
        ARM_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)

    - publish: $(terraformWorkingDir)/tfplan
      displayName: Publish Terraform Plan Artifact
      artifact: terraform-plan